<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Terminal Leave Countdown</title>
  <meta name="description" content="Countdown to terminal leave.">
  <link rel="preload" href="assets/lakeside-background.webp" as="image">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="hero" aria-label="Terminal Leave countdown">
    <section class="countdown" aria-live="polite">
      <p class="label">Terminal Leave</p>

      <div class="grid" id="countdown">
        <div>
          <span id="days">---</span>
          <small>Days</small>
        </div>
        <div>
          <span id="hours">--</span>
          <small>Hours</small>
        </div>
        <div>
          <span id="minutes">--</span>
          <small>Minutes</small>
        </div>
        <div>
          <span id="seconds">--</span>
          <small>Seconds</small>
        </div>
      </div>

      <p class="date">17 September 2028</p>
    </section>
  </main>

  <script src="countdown.js"></script>
</body>
</html>
